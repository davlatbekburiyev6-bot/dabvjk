<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <title>NeoNote X</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Montserrat:wght@300;500;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at top, #0f0c29, #302b63, #24243e);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #00f5ff, transparent 70%);
            filter: blur(120px);
            animation: move 12s infinite alternate;
        }

        @keyframes move {
            from {
                transform: translate(-150px, -100px)
            }

            to {
                transform: translate(150px, 100px)
            }
        }

        .app {
            position: relative;
            width: 400px;
            padding: 30px;
            border-radius: 25px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.2);
            color: white;
            z-index: 2;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            font-size: 26px;
            letter-spacing: 3px;
            color: #00f5ff;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(0, 245, 255, 0.8);
        }

        .input-zone {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
        }

        input::placeholder {
            color: #ccc;
        }

        .add {
            padding: 14px 18px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #00f5ff, #7f00ff);
            color: white;
            font-weight: 700;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.6);
        }

        .add:hover {
            transform: scale(1.1);
        }

        .list {
            margin-top: 20px;
            max-height: 320px;
            overflow-y: auto;
        }

        .item {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 14px;
            border-radius: 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: pop 0.4s ease;
        }

        @keyframes pop {
            from {
                transform: scale(0.8);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        .trash {
            background: none;
            border: none;
            color: #ff4b7d;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .trash:hover {
            transform: scale(1.3);
        }

        .signature {
            text-align: center;
            margin-top: 15px;
            font-size: 11px;
            opacity: 0.6;
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>

    <div class="app">
        <div class="logo">NEONOTE X</div>
        <div class="input-zone">
            <input id="text" placeholder="Neo yozuv kiriting...">
            <button class="add" onclick="save()">ADD</button>
        </div>

        <div class="list" id="list"></div>

        <div class="signature">Exclusive edition ⚡</div>
    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem('neonotes')) || [];
        const list = document.getElementById('list');

        function render() {
            list.innerHTML = '';
            notes.forEach((n, i) => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `<span>${n}</span><button class='trash' onclick='del(${i})'>✖</button>`;
                list.appendChild(div);
            });
            localStorage.setItem('neonotes', JSON.stringify(notes));
        }

        function save() {
            const t = document.getElementById('text').value.trim();
            if (t == '' || t === '`') return; // ` saqlanmaydi
            notes.push(t);
            document.getElementById('text').value = '';
            render();
        }

        function del(i) {
            notes.splice(i, 1);
            render();
        }

        render();
    </script>
</body>

</html>
